services:
  proxy:
    image: nginx:1.27-alpine
    container_name: epicbook-proxy
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/certs:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - public
      - private
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  app:
    image: "${APP_IMAGE:-epicbook-app}:${APP_TAG:-dev}"
    build:
      context: ./theepicbook
      dockerfile: Dockerfile
    container_name: epicbook-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      DB_URL: "mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - private
    volumes:
      - app-logs:/app/logs
    init: true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8080/').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  db:
    image: mysql:8.0
    container_name: epicbook-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
      - ./theepicbook/db:/docker-entrypoint-initdb.d:ro
    networks:
      - private
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

volumes:
  app-logs:
  db-data:

networks:
  public:
  private:
